<!DOCTYPE html>
<html>

<head>
    <title>India Pincode Search</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
        }

        #map {
            height: 100vh;
            width: 100%;
        }

        #search-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: white;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            display: flex;
            gap: 12px;
            align-items: center;
            width: 90%;
            max-width: 450px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        #pincode-input {
            flex: 1;
            padding: 12px 15px;
            font-size: 16px;
            border: 1px solid #ced4da;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
        }

        #pincode-input:focus {
            border-color: #4dabf7;
            box-shadow: 0 0 0 3px rgba(77, 171, 247, 0.2);
        }

        #search-btn {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            background-color: #339af0;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        #search-btn:hover {
            background-color: #228be6;
        }

        #search-btn:active {
            transform: scale(0.98);
        }

        #search-btn:disabled {
            background-color: #adb5bd;
            cursor: not-allowed;
            transform: none;
        }

        #loading {
            position: absolute;
            top: 90px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            color: #495057;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            display: none;
            text-align: center;
            border: 1px solid #dee2e6;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(51, 154, 240, 0.3);
            border-radius: 50%;
            border-top-color: #339af0;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #error-msg {
            color: #fa5252;
            font-size: 14px;
            font-weight: 500;
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            width: 100%;
            text-align: center;
        }
    </style>
</head>

<body>

    <div id="search-container">
        <input type="text" id="pincode-input" placeholder="Enter Pincode (e.g. 700091)" />
        <button id="search-btn" disabled>Search</button>
        <div id="error-msg"></div>
    </div>
    <div id="loading">
        <span class="spinner"></span>
        <span id="loading-text">Loading Pincode Data (~90MB)... Please wait.</span>
    </div>

    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Initialize map centered around India
        var map = L.map('map').setView([20.5937, 78.9629], 5);

        // OpenStreetMap Tile Layer
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        let allFeatures = [];
        let currentLayer = null;

        const loadingDiv = document.getElementById('loading');
        const loadingText = document.getElementById('loading-text');
        const searchBtn = document.getElementById('search-btn');
        const pincodeInput = document.getElementById('pincode-input');
        const errorMsg = document.getElementById('error-msg');

        // Load GeoJSON data
        async function loadData() {
            try {
                loadingDiv.style.display = 'block';
                searchBtn.disabled = true;

                const response = await fetch('All_India_pincode_Boundary-19312.geojson');

                if (!response.ok) {
                    throw new Error("HTTP error " + response.status);
                }

                const data = await response.json();
                allFeatures = data.features;

                loadingDiv.style.display = 'none';
                searchBtn.disabled = false;
            } catch (error) {
                console.error("Error loading data:", error);

                // Check if it's likely a CORS/local file issue
                if (window.location.protocol === 'file:') {
                    loadingText.innerHTML = 'Error: Cannot load data from a local file protocol (file://).<br><br>Please run a local server (e.g., using VS Code Live Server, Python HTTP server, or Node.js).';
                    loadingText.style.color = '#e03131';
                    document.querySelector('.spinner').style.display = 'none';
                } else {
                    loadingText.innerText = "Error loading data: " + error.message;
                    loadingText.style.color = '#e03131';
                    document.querySelector('.spinner').style.display = 'none';
                }
            }
        }

        // Call loadData immediately
        loadData();

        function searchPincode() {
            errorMsg.innerText = '';
            const searchVal = pincodeInput.value.trim();

            if (!searchVal) {
                errorMsg.innerText = 'Please enter a pincode';
                return;
            }

            if (allFeatures.length === 0) {
                errorMsg.innerText = 'Data not loaded yet. Please wait or check for errors.';
                return;
            }

            // Find match
            const match = allFeatures.find(f => f.properties.Pincode == searchVal);

            if (match) {
                // Remove previous layer
                if (currentLayer) {
                    map.removeLayer(currentLayer);
                }

                // Draw new layer
                currentLayer = L.geoJSON(match, {
                    style: {
                        color: "#228be6",
                        weight: 3,
                        fillColor: "#74c0fc",
                        fillOpacity: 0.5
                    },
                    onEachFeature: function (feature, layer) {
                        layer.bindPopup(
                            "<div style='font-family: Arial;'>" +
                            "<h3 style='margin: 0 0 8px 0; color: #1c7ed6;'>Pincode: " + (feature.properties.Pincode || "N/A") + "</h3>" +
                            "<b>Office:</b> " + (feature.properties.Office_Name || "N/A") + "<br>" +
                            "<b>Division:</b> " + (feature.properties.Division || "N/A") + "<br>" +
                            "<b>Region:</b> " + (feature.properties.Region || "N/A") + "<br>" +
                            "<b>Circle:</b> " + (feature.properties.Circle || "N/A") +
                            "</div>"
                        );
                    }
                }).addTo(map);

                // Fit bounds
                map.fitBounds(currentLayer.getBounds());
                currentLayer.openPopup();
            } else {
                errorMsg.innerText = 'Pincode not found!';
            }
        }

        searchBtn.addEventListener('click', searchPincode);
        pincodeInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                searchPincode();
            }
        });

    </script>

</body>

</html>
